<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohm Shop - Shipping Address</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fa-solid fa-store"></i> <a href="index.html" style="color: inherit; text-decoration: none;">Ohm Shop</a>
            </div>
        </div>
    </nav>

    <main class="products-section" style="padding-top: 4rem;">
        <h2 class="section-title">Shipping Address</h2>
        <div style="max-width: 800px; margin: 0 auto;">
            <div id="addressListContainer" style="display: none;">
                <h3 style="margin-bottom: 1.5rem; color: var(--text-color);">Select Delivery Address</h3>
                <div id="addressCards" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;">
                    <!-- Rendered Address Cards Go Here -->
                </div>
                
                <button id="showAddAddressBtn" class="btn secondary-btn" style="margin-bottom: 1.5rem;"><i class="fa-solid fa-plus"></i> Add New Address</button>
                <div class="text-muted" id="maxAddressLimitMsg" style="display: none; margin-bottom: 1rem; font-size: 0.875rem;">Limit of 3 addresses reached.</div>
                
                <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                    <button id="proceedToPaymentBtn" class="btn primary-btn w-100" disabled>Continue to Payment</button>
                </div>
            </div>

            <div id="addAddressContainer" class="product-card" style="padding: 2.5rem; display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 style="margin: 0; color: var(--text-color);">Add New Address</h3>
                    <button id="cancelAddAddressBtn" class="icon-btn" style="display: none;"><i class="fa-solid fa-times"></i></button>
                </div>
                <form id="addressForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" required placeholder="Enter your phone number">
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" required placeholder="Enter your street address" rows="3" style="width: 100%; border-radius: var(--radius-md); border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-main); padding: 0.8rem;"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" required placeholder="Enter your city">
                    </div>
                    <div class="form-group">
                        <label for="state">State</label>
                        <input type="text" id="state" required placeholder="Enter your state">
                    </div>
                    <div class="form-group">
                        <label for="pincode">PIN Code</label>
                        <input type="text" id="pincode" required placeholder="Enter your PIN code" pattern="[0-9]{5,6}">
                    </div>
                    <div id="addressError" class="error-msg"></div>
                    <button type="submit" class="btn primary-btn w-100 mt-3" id="saveAddressBtn">Save Address</button>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="js/address.js"></script>
</body>
</html>
