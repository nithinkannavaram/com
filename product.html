<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - KN SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js",
          "firebase/analytics": "https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics.js"
        }
      }
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="ganesha-logo.png" class="logo-icon" alt="KN Shop Logo">
                <span class="logo-text">KN SHOP</span>
            </a>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search products...">
                <i class="fa fa-magnifying-glass"></i>
            </div>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="wishlist.html" class="icon-btn"><i class="fa-regular fa-heart"></i></a></li>
                <li id="userGreeting" class="user-profile-dropdown" style="display: none;">
                    <button class="user-greeting-btn" id="userDropdownBtn">
                        <span id="userNameDisplay">User</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu">
                        <a href="profile.html" class="dropdown-item"><i class="fa-solid fa-circle-user"></i> My Profile</a>
                        <a href="orders.html" class="dropdown-item"><i class="fa-solid fa-box-open"></i> My Orders</a>
                        <a href="wishlist.html" class="dropdown-item"><i class="fa-solid fa-heart"></i> My Wishlist</a>
                        <div class="dropdown-divider"></div>
                        <button id="logoutBtnDropdown" class="dropdown-item logout-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                    </div>
                </li>
                <li><a href="#" id="cartBtn" class="icon-btn cart-toggle">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cartCount" class="badge">0</span>
                </a></li>
            </ul>
        </div>
    </nav>

    <main class="product-detail-page" style="padding-top: 6rem; min-height: 80vh;">
        <div class="nav-container">
            <div id="productLoading" class="text-center" style="margin-top: 4rem;">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 3rem; color: var(--primary-color);"></i>
                <p style="margin-top: 1.5rem; color: var(--text-muted); font-size: 1.2rem;">Loading product details...</p>
            </div>
            <div id="productContent" style="display: none;">
                <!-- Product content loaded dynamically from product.js -->
                <div class="product-grid-detail">
                    <div class="product-image-side">
                        <img id="image" src="" alt="Product Image" class="main-image">
                    </div>
                    <div class="product-info-side">
                        <h1 id="title" class="product-title">Loading...</h1>
                        <p class="product-price" id="price">₹0.00</p>
                        
                        <!-- Size Selector -->
                        <div class="size-selector-container">
                            <span class="size-label">Select Size</span>
                            <div class="size-options" id="sizeOptions">
                                <!-- Sizes dynamically loaded -->
                            </div>
                        </div>

                        <div class="product-actions">
                            <button id="addToCartBtn" class="btn primary-btn large">Add to Bag</button>
                            <button id="addToWishlistBtn" class="btn secondary-btn large">Add to Wishlist</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Shopping Bag Modal -->
    <div class="modal" id="cartModal">
        <div class="modal-content side-drawer">
            <div class="drawer-header">
                <h3>Shopping Bag</h3>
                <button class="close-btn">&times;</button>
            </div>
            <div class="drawer-body" id="cartItems"></div>
            <div class="drawer-footer">
                <div class="total-row"><span>Total:</span><span id="cartTotalValue">₹0.00</span></div>
                <button id="checkoutBtn" class="btn primary-btn w-100" disabled>Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/product.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
