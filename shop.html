<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - KN SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js",
          "firebase/analytics": "https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics.js"
        }
      }
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="ganesha-logo.png" class="logo-icon" alt="KN Shop Logo">
                <span class="logo-text">KN SHOP</span>
            </a>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search products...">
                <i class="fa fa-magnifying-glass"></i>
            </div>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                
                <li>
                    <button id="cartBtn" class="icon-btn cart-toggle" aria-label="Open Shopping Bag" style="background: none; border: none; color: inherit; font-size: 1.1rem; cursor: pointer; position: relative;">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span id="cartCount" class="badge">0</span>
                    </button>
                </li>

                <li id="userGreeting" class="user-profile-dropdown" style="display: none;">
                    <div class="user-greeting-btn" id="userDropdownBtn">
                        <i class="fa-solid fa-user-circle" style="font-size: 1.2rem; color: var(--primary-color);"></i>
                        <span id="userNameDisplay">User</span>
                        <i class="fa-solid fa-chevron-down" style="font-size: 0.7rem;"></i>
                    </div>
                    <div class="dropdown-menu">
                        <a href="profile.html" class="dropdown-item"><i class="fa-solid fa-circle-user"></i> My Profile</a>
                        <a href="orders.html" class="dropdown-item"><i class="fa-solid fa-box-open"></i> My Orders</a>
                        <a href="wishlist.html" class="dropdown-item"><i class="fa-solid fa-heart"></i> My Wishlist</a>
                        <div class="dropdown-divider"></div>
                        <button id="logoutBtnDropdown" class="dropdown-item logout-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                    </div>
                </li>

                <li class="auth-btns">
                    <div id="guestBtns">
                        <button class="btn primary-btn" id="loginBtn">Login</button>
                        <button class="btn secondary-btn" id="signupBtn">Signup</button>
                    </div>
                </li>
            </ul>

            <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </nav>

    <main class="results-page" style="padding-top: 5rem; min-height: 80vh;">
        <div class="nav-container">
            <h2 class="section-title">Our Complete Collection</h2>
            <p id="resultCount" style="color: var(--text-muted); margin-bottom: 2rem;">Loading our best products...</p>
            
            <div id="loadingIndicator" class="text-center" style="margin-top: 3rem;">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 3rem; color: var(--primary-color);"></i>
            </div>

            <div id="shopProducts" class="product-grid"></div>
        </div>
    </main>

    <!-- Shopping Bag Modal -->
    <div class="modal" id="cartModal">
        <div class="modal-content side-drawer">
            <div class="drawer-header">
                <h3>Shopping Bag</h3>
                <button class="close-btn">&times;</button>
            </div>
            <div class="drawer-body" id="cartItems"></div>
            <div class="drawer-footer">
                <div class="total-row"><span>Total:</span><span id="cartTotalValue">₹0.00</span></div>
                <button id="checkoutBtn" class="btn primary-btn w-100" disabled>Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/shop.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
